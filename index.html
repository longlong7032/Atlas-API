<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Numerology Calculator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
    <main class="container py-4 py-md-5">
        <div class="row justify-content-center">
            <div class="col-12 col-xl-10">
                <div class="card shadow-sm border-0">
                    <div class="card-body p-3 p-md-4">
                        <div class="mb-4">
                            <h1 class="h3 mb-2">Hiển thị kết quả</h1>
                            <p class="text-secondary mb-0">Nhập họ tên và ngày sinh, rồi xem kết quả trả về trong bảng
                                bên dưới.</p>
                        </div>

                        <form id="calcForm" class="row g-3 align-items-end">
                            <div class="col-12 col-md-6 col-lg-5">
                                <label for="fullName" class="form-label">Họ tên</label>
                                <input type="text" class="form-control" id="fullName" name="fullName"
                                    placeholder="NGUYEN ANH THU" value="NGUYEN THỊ THUÝ MAI" required>
                            </div>
                            <div class="col-12 col-md-4 col-lg-3">
                                <label for="birthDate" class="form-label">Ngày sinh</label>
                                <input type="date" class="form-control" id="birthDate" name="birthDate"
                                    value="1973-09-08" required>
                            </div>
                            <div class="col-12 col-md-2 col-lg-2">
                                <button type="submit" class="btn btn-primary w-100">Tính kết quả</button>
                            </div>
                        </form>

                        <div id="status" class="alert alert-info mt-4 mb-3 py-2" role="status">Sẵn sàng.</div>
                        <div id="error" class="alert alert-danger d-none mb-3 py-2" role="alert"></div>

                        <div class="table-responsive">
                            <table class="table table-bordered table-striped align-middle mb-0">
                                <thead class="table-dark">
                                    <tr>
                                        <th scope="col" class="w-25">Trường</th>
                                        <th scope="col">Giá trị</th>
                                    </tr>
                                </thead>
                                <tbody id="resultBody">
                                    <tr>
                                        <td>name</td>
                                        <td>-</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const form = document.getElementById("calcForm");
        const resultBody = document.getElementById("resultBody");
        const statusEl = document.getElementById("status");
        const errorEl = document.getElementById("error");

        function renderTable(data) {
            const rows = Object.entries(data).map(([key, value]) => {
                const items = Array.isArray(value) ? value : [value];
                const content = items.length
                    ? `<ul class="list-group list-group-flush">${items.map((item) => `<li class="list-group-item px-0 py-1 border-0">${String(item ?? "-")}</li>`).join("")}</ul>`
                    : `<span>-</span>`;

                return `<tr><th scope="row" class="text-nowrap">${key}</th><td>${content}</td></tr>`;
            });

            resultBody.innerHTML = rows.join("");
        }

        form.addEventListener("submit", async (event) => {
            event.preventDefault();
            errorEl.classList.add("d-none");
            errorEl.textContent = "";
            statusEl.className = "alert alert-info mt-4 mb-3 py-2";
            statusEl.textContent = "Đang gọi API...";

            const name = document.getElementById("fullName").value.trim();
            const birthday = document.getElementById("birthDate").value;

            try {
                const response = await fetch(`/calculate?name=${encodeURIComponent(name)}&birthday=${encodeURIComponent(birthday)}`);
                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.message || `API lỗi: ${response.status}`);
                }

                renderTable(data);
                statusEl.className = "alert alert-success mt-4 mb-3 py-2";
                statusEl.textContent = "Đã cập nhật kết quả.";
            } catch (error) {
                statusEl.className = "alert alert-warning mt-4 mb-3 py-2";
                statusEl.textContent = "Không thể lấy kết quả.";
                errorEl.textContent = error.message || String(error);
                errorEl.classList.remove("d-none");
            }
        });

        form.requestSubmit();
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
