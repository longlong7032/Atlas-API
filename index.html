<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Numerology Calculator</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="h-screen cursor-[url('/assets/compass.png')_16_16,_auto] overflow-hidden bg-[radial-gradient(circle_at_top,rgba(247,182,32,0.14),transparent_30%),linear-gradient(180deg,#031E45_0%,#04172f_100%)] text-[#F8F4E6]">
    <main class="h-screen p-3 sm:p-4 lg:p-6 flex items-center justify-center">
        <section class="group flex h-full w-full max-w-7xl flex-col overflow-hidden rounded-3xl border border-white/10 bg-[#031E45]/85 shadow-2xl shadow-black/30 backdrop-blur transition duration-300 ease-out hover:-translate-y-0.5 hover:shadow-[0_30px_90px_rgba(0,0,0,0.35)]">
            <header class="shrink-0 border-b border-white/10 px-4 py-4 sm:px-6 sm:py-5">
                <div class="flex flex-col gap-2">
                    <h1 class="text-xl font-semibold tracking-tight text-[#F7B620] transition duration-300 group-hover:tracking-normal sm:text-2xl">Công cụ kiểm tra Công thức Thần Số Học ATLAS</h1>
                </div>
            </header>

            <div class="shrink-0 px-4 py-4 sm:px-6">
                <form id="calcForm" class="grid gap-3 lg:grid-cols-[minmax(0,1.7fr)_minmax(180px,0.7fr)_auto] lg:items-end">
                    <div>
                        <label for="fullName" class="mb-1.5 block text-sm font-medium text-white/75">Họ tên</label>
                        <input type="text" id="fullName" name="fullName" placeholder="NGUYEN ANH THU" value="NGUYEN THỊ THUÝ MAI"
                            required
                            class="h-12 w-full rounded-2xl border border-white/10 bg-white/5 px-4 text-sm text-[#F8F4E6] outline-none placeholder:text-white/35 transition duration-200 ease-out hover:border-[#F7B620]/50 hover:bg-white/[0.08] hover:shadow-sm focus:border-[#F7B620] focus:ring-4 focus:ring-[#F7B620]/15">
                    </div>
                    <div>
                        <label for="birthDate" class="mb-1.5 block text-sm font-medium text-white/75">Ngày sinh</label>
                        <input type="date" id="birthDate" name="birthDate" value="1973-09-08" required
                            class="h-12 w-full rounded-2xl border border-white/10 bg-white/5 px-4 text-sm text-[#F8F4E6] outline-none transition duration-200 ease-out hover:border-[#F7B620]/50 hover:bg-white/[0.08] hover:shadow-sm focus:border-[#F7B620] focus:ring-4 focus:ring-[#F7B620]/15">
                    </div>
                    <div>
                        <button type="submit"
                            class="h-12 w-full rounded-2xl bg-[#F7B620] px-5 text-sm font-semibold text-[#031E45] shadow-sm shadow-[#F7B620]/15 transition duration-200 ease-out hover:-translate-y-0.5 hover:bg-[#ffca44] hover:shadow-lg hover:shadow-[#F7B620]/20 active:translate-y-0 active:scale-[0.99] focus:outline-none focus:ring-4 focus:ring-[#F7B620]/20 lg:w-auto">
                            Tính kết quả
                        </button>
                    </div>
                </form>
            </div>

            <div class="shrink-0 px-4 pb-2 sm:px-6">
                <div id="status" class="rounded-2xl border border-white/10 bg-white/5 px-4 py-3 text-sm text-white/75 transition duration-300 hover:bg-white/[0.08]" role="status">Sẵn sàng.</div>
                <div id="error" class="mt-3 hidden rounded-2xl border border-rose-400/20 bg-rose-500/10 px-4 py-3 text-sm text-rose-200 transition duration-300 hover:bg-rose-500/15" role="alert"></div>
            </div>

            <div class="min-h-0 flex-1 px-4 pb-4 sm:px-6 sm:pb-6">
                <div class="mb-3 flex items-center justify-between gap-3 text-sm text-white/55">
                    <span id="resultCount">0 chỉ số</span>
                </div>
                <div id="resultsGrid" class="grid h-full min-h-0 grid-cols-1 gap-3 p-3 overflow-auto pr-1 md:grid-cols-2 xl:grid-cols-3">
                    <div class="rounded-2xl border border-dashed border-white/15 bg-white/5 p-4 text-sm text-white/55 transition duration-300 hover:border-[#F7B620]/40 hover:bg-white/[0.08]">
                        Chưa có dữ liệu. Bấm <strong>Tính kết quả</strong> để xem kết quả.
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script>
        const form = document.getElementById("calcForm");
        const resultsGrid = document.getElementById("resultsGrid");
        const resultCount = document.getElementById("resultCount");
        const statusEl = document.getElementById("status");
        const errorEl = document.getElementById("error");

        function escapeHtml(value) {
            return String(value ?? "-")
                .replaceAll("&", "&amp;")
                .replaceAll("<", "&lt;")
                .replaceAll(">", "&gt;")
                .replaceAll('"', "&quot;")
                .replaceAll("'", "&#39;");
        }

        function renderValue(value) {
            const items = Array.isArray(value) ? value : [value];
            return items.map((item) => `
                <span class="inline-flex min-h-8 items-center rounded-full bg-[#F7B620]/15 px-3 py-1 text-sm font-semibold text-[#F7B620] transition duration-200 ease-out hover:-translate-y-0.5 hover:bg-[#F7B620]/[0.22] hover:shadow-sm hover:shadow-[#F7B620]/10">
                    ${escapeHtml(item)}
                </span>
            `).join("");
        }

        function renderCards(data) {
            const entries = Object.entries(data || {});
            resultCount.textContent = `${entries.length} chỉ số`;

            if (!entries.length) {
                resultsGrid.innerHTML = `
                    <div class="rounded-2xl border border-dashed border-slate-300 bg-white/70 p-4 text-sm text-slate-500">
                        Không có dữ liệu để hiển thị.
                    </div>
                `;
                return;
            }

            resultsGrid.innerHTML = entries.map(([key, value]) => `
                <article class="rounded-2xl border border-white/10 bg-white/5 p-4 shadow-sm shadow-black/10 transition duration-300 ease-out hover:-translate-y-0.5 hover:border-[#F7B620]/30 hover:bg-white/[0.08] hover:shadow-lg hover:shadow-black/20">
                    <div class="mb-2 text-xs font-semibold uppercase tracking-[0.18em] text-[#F7B620] transition duration-300">${escapeHtml(key)}</div>
                    <div class="flex flex-wrap gap-2">${renderValue(value)}</div>
                </article>
            `).join("");
        }

        form.addEventListener("submit", async (event) => {
            event.preventDefault();
            errorEl.classList.add("hidden");
            errorEl.textContent = "";
            statusEl.className = "rounded-2xl border border-white/10 bg-white/5 px-4 py-3 text-sm text-white/75";
            statusEl.textContent = "Đang gọi API...";

            const name = document.getElementById("fullName").value.trim();
            const birthday = document.getElementById("birthDate").value;

            try {
                const response = await fetch(`/calculate?name=${encodeURIComponent(name)}&birthday=${encodeURIComponent(birthday)}`);
                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.message || `API lỗi: ${response.status}`);
                }

                renderCards(data);
                statusEl.className = "rounded-2xl border border-[#F7B620]/20 bg-[#F7B620]/10 px-4 py-3 text-sm text-[#F7B620]";
                statusEl.textContent = "Đã cập nhật kết quả.";
            } catch (error) {
                statusEl.className = "rounded-2xl border border-amber-400/20 bg-amber-500/10 px-4 py-3 text-sm text-amber-200";
                statusEl.textContent = "Không thể lấy kết quả.";
                errorEl.textContent = error.message || String(error);
                errorEl.classList.remove("hidden");
            }
        });

        form.requestSubmit();
    </script>
</body>

</html>
