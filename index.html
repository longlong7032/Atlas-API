<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Numerology Calculator</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="h-screen cursor-[url('/assets/compass.png')_16_16,_auto] overflow-hidden bg-gradient-to-br from-stone-50 via-amber-50 to-emerald-50 text-slate-900">
    <main class="h-screen p-3 sm:p-4 lg:p-6 flex items-center justify-center">
        <section class="group flex h-full w-full max-w-7xl flex-col overflow-hidden rounded-3xl border border-slate-200/70 bg-white/80 shadow-2xl backdrop-blur transition duration-300 ease-out hover:-translate-y-0.5 hover:shadow-[0_30px_90px_rgba(15,23,42,0.18)]">
            <header class="shrink-0 border-b border-slate-200/70 px-4 py-4 sm:px-6 sm:py-5">
                <div class="flex flex-col gap-2">
                    <h1 class="text-xl font-semibold tracking-tight transition duration-300 group-hover:tracking-normal sm:text-2xl">Công cụ kiểm tra Công thức Thần Số Học ATLAS</h1>
                </div>
            </header>

            <div class="shrink-0 px-4 py-4 sm:px-6">
                <form id="calcForm" class="grid gap-3 lg:grid-cols-[minmax(0,1.7fr)_minmax(180px,0.7fr)_auto] lg:items-end">
                    <div>
                        <label for="fullName" class="mb-1.5 block text-sm font-medium text-slate-700">Họ tên</label>
                        <input type="text" id="fullName" name="fullName" placeholder="NGUYEN ANH THU" value="NGUYEN THỊ THUÝ MAI"
                            required
                            class="h-12 w-full rounded-2xl border border-slate-300 bg-white px-4 text-sm outline-none transition duration-200 ease-out hover:border-emerald-300 hover:shadow-sm focus:border-emerald-500 focus:ring-4 focus:ring-emerald-100">
                    </div>
                    <div>
                        <label for="birthDate" class="mb-1.5 block text-sm font-medium text-slate-700">Ngày sinh</label>
                        <input type="date" id="birthDate" name="birthDate" value="1973-09-08" required
                            class="h-12 w-full rounded-2xl border border-slate-300 bg-white px-4 text-sm outline-none transition duration-200 ease-out hover:border-emerald-300 hover:shadow-sm focus:border-emerald-500 focus:ring-4 focus:ring-emerald-100">
                    </div>
                    <div>
                        <button type="submit"
                            class="h-12 w-full rounded-2xl bg-emerald-700 px-5 text-sm font-semibold text-white shadow-sm transition duration-200 ease-out hover:-translate-y-0.5 hover:bg-emerald-800 hover:shadow-lg active:translate-y-0 active:scale-[0.99] focus:outline-none focus:ring-4 focus:ring-emerald-200 lg:w-auto">
                            Tính kết quả
                        </button>
                    </div>
                </form>
            </div>

            <div class="shrink-0 px-4 pb-2 sm:px-6">
                <div id="status" class="rounded-2xl border border-sky-200 bg-sky-50 px-4 py-3 text-sm text-sky-800 transition duration-300 hover:bg-sky-100" role="status">Sẵn sàng.</div>
                <div id="error" class="mt-3 hidden rounded-2xl border border-rose-200 bg-rose-50 px-4 py-3 text-sm text-rose-700 transition duration-300 hover:bg-rose-100" role="alert"></div>
            </div>

            <div class="min-h-0 flex-1 px-4 pb-4 sm:px-6 sm:pb-6">
                <div class="mb-3 flex items-center justify-between gap-3 text-sm text-slate-500">
                    <span id="resultCount">0 chỉ số</span>
                </div>
                <div id="resultsGrid" class="grid h-full min-h-0 grid-cols-1 gap-3 p-3 overflow-auto pr-1 md:grid-cols-2 xl:grid-cols-3">
                    <div class="rounded-2xl border border-dashed border-slate-300 bg-white/70 p-4 text-sm text-slate-500 transition duration-300 hover:border-emerald-300 hover:bg-white">
                        Chưa có dữ liệu. Bấm <strong>Tính kết quả</strong> để xem kết quả.
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script>
        const form = document.getElementById("calcForm");
        const resultsGrid = document.getElementById("resultsGrid");
        const resultCount = document.getElementById("resultCount");
        const statusEl = document.getElementById("status");
        const errorEl = document.getElementById("error");

        function escapeHtml(value) {
            return String(value ?? "-")
                .replaceAll("&", "&amp;")
                .replaceAll("<", "&lt;")
                .replaceAll(">", "&gt;")
                .replaceAll('"', "&quot;")
                .replaceAll("'", "&#39;");
        }

        function renderValue(value) {
            const items = Array.isArray(value) ? value : [value];
            return items.map((item) => `
                <span class="inline-flex min-h-8 items-center rounded-full bg-emerald-50 px-3 py-1 text-sm font-semibold text-emerald-800 transition duration-200 ease-out hover:-translate-y-0.5 hover:bg-emerald-100 hover:shadow-sm">
                    ${escapeHtml(item)}
                </span>
            `).join("");
        }

        function renderCards(data) {
            const entries = Object.entries(data || {});
            resultCount.textContent = `${entries.length} chỉ số`;

            if (!entries.length) {
                resultsGrid.innerHTML = `
                    <div class="rounded-2xl border border-dashed border-slate-300 bg-white/70 p-4 text-sm text-slate-500">
                        Không có dữ liệu để hiển thị.
                    </div>
                `;
                return;
            }

            resultsGrid.innerHTML = entries.map(([key, value]) => `
                <article class="rounded-2xl border border-slate-200 bg-white p-4 shadow-sm transition duration-300 ease-out hover:-translate-y-0.5 hover:border-emerald-200 hover:shadow-lg">
                    <div class="mb-2 text-xs font-semibold uppercase tracking-[0.18em] text-amber-700 transition duration-300">${escapeHtml(key)}</div>
                    <div class="flex flex-wrap gap-2">${renderValue(value)}</div>
                </article>
            `).join("");
        }

        form.addEventListener("submit", async (event) => {
            event.preventDefault();
            errorEl.classList.add("hidden");
            errorEl.textContent = "";
            statusEl.className = "rounded-2xl border border-sky-200 bg-sky-50 px-4 py-3 text-sm text-sky-800";
            statusEl.textContent = "Đang gọi API...";

            const name = document.getElementById("fullName").value.trim();
            const birthday = document.getElementById("birthDate").value;

            try {
                const response = await fetch(`/calculate?name=${encodeURIComponent(name)}&birthday=${encodeURIComponent(birthday)}`);
                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.message || `API lỗi: ${response.status}`);
                }

                renderCards(data);
                statusEl.className = "rounded-2xl border border-emerald-200 bg-emerald-50 px-4 py-3 text-sm text-emerald-800";
                statusEl.textContent = "Đã cập nhật kết quả.";
            } catch (error) {
                statusEl.className = "rounded-2xl border border-amber-200 bg-amber-50 px-4 py-3 text-sm text-amber-800";
                statusEl.textContent = "Không thể lấy kết quả.";
                errorEl.textContent = error.message || String(error);
                errorEl.classList.remove("hidden");
            }
        });

        form.requestSubmit();
    </script>
</body>

</html>
