<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Numerology Calculator</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="h-screen cursor-[url('/assets/compass.png')_16_16,_auto] overflow-hidden bg-[radial-gradient(circle_at_top,rgba(247,182,32,0.14),transparent_30%),linear-gradient(180deg,#031E45_0%,#04172f_100%)] text-[#F8F4E6]">
    <main class="h-screen p-3 sm:p-4 lg:p-6 flex items-center justify-center">
        <section class="group flex h-full w-full max-w-7xl flex-col overflow-hidden rounded-3xl border border-white/10 bg-[#031E45]/85 shadow-2xl shadow-black/30 backdrop-blur transition duration-300 ease-out hover:-translate-y-0.5 hover:shadow-[0_30px_90px_rgba(0,0,0,0.35)]">
            <header class="shrink-0 border-b border-white/10 px-4 py-4 sm:px-6 sm:py-5">
                <div class="flex flex-col gap-2">
                    <h1 class="text-xl font-semibold tracking-tight text-[#F7B620] transition duration-300 group-hover:tracking-normal sm:text-2xl">Công cụ kiểm tra Công thức Thần Số Học ATLAS</h1>
                </div>
            </header>

            <div class="shrink-0 px-4 py-3 sm:px-6">
                <form id="calcForm" class="grid gap-2 lg:grid-cols-[minmax(0,1.7fr)_minmax(160px,0.65fr)_auto_auto] lg:items-end">
                    <div>
                        <label for="fullName" class="mb-1 block text-xs font-medium text-white/70">Họ tên</label>
                        <input type="text" id="fullName" name="fullName" placeholder="NGUYEN ANH THU" value="NGUYEN THỊ THUÝ MAI"
                            required
                            class="h-10 w-full rounded-xl border border-white/10 bg-white/5 px-3.5 text-sm text-[#F8F4E6] outline-none placeholder:text-white/35 transition duration-200 ease-out hover:border-[#F7B620]/50 hover:bg-white/[0.08] hover:shadow-sm focus:border-[#F7B620] focus:ring-4 focus:ring-[#F7B620]/15">
                    </div>
                    <div>
                        <label for="birthDate" class="mb-1 block text-xs font-medium text-white/70">Ngày sinh</label>
                        <input type="date" id="birthDate" name="birthDate" value="1973-09-08" required
                            class="h-10 w-full rounded-xl border border-white/10 bg-white/5 px-3.5 text-sm text-[#F8F4E6] outline-none transition duration-200 ease-out hover:border-[#F7B620]/50 hover:bg-white/[0.08] hover:shadow-sm focus:border-[#F7B620] focus:ring-4 focus:ring-[#F7B620]/15">
                    </div>
                    <div>
                        <button type="submit"
                            class="h-10 w-full rounded-xl bg-[#F7B620] px-4 text-sm font-semibold text-[#031E45] shadow-sm shadow-[#F7B620]/15 transition duration-200 ease-out hover:-translate-y-0.5 hover:bg-[#ffca44] hover:shadow-lg hover:shadow-[#F7B620]/20 active:translate-y-0 active:scale-[0.99] focus:outline-none focus:ring-4 focus:ring-[#F7B620]/20 lg:w-auto">
                            Tính kết quả
                        </button>
                    </div>
                    <div>
                        <button type="button" id="shareBtn" disabled
                            class="h-10 w-full rounded-xl border border-white/10 bg-white/5 px-4 text-sm font-semibold text-white/40 shadow-sm transition duration-200 ease-out hover:-translate-y-0.5 hover:border-[#F7B620]/40 hover:bg-white/[0.08] hover:text-[#F7B620] hover:shadow-lg hover:shadow-black/20 disabled:cursor-not-allowed disabled:hover:translate-y-0 disabled:hover:border-white/10 disabled:hover:bg-white/5 disabled:hover:text-white/40 lg:w-auto">
                            Share
                        </button>
                    </div>
                </form>
            </div>

            <div class="shrink-0 px-4 pb-1 sm:px-6">
                <div id="error" class="hidden rounded-2xl border border-rose-400/20 bg-rose-500/10 px-4 py-2 text-sm text-rose-200 transition duration-300 hover:bg-rose-500/15" role="alert"></div>
            </div>

            <div class="min-h-0 flex-1 px-4 pb-4 sm:px-6 sm:pb-5">
                <div class="mb-2 flex items-center justify-between gap-3 text-sm text-white/55">
                    <span id="resultCount">0 chỉ số</span>
                </div>
                <div id="resultsGrid" class="grid h-full min-h-0 grid-cols-1 gap-2 overflow-auto pr-1 md:grid-cols-2 xl:grid-cols-3">
                    <div class="rounded-2xl border border-dashed border-white/15 bg-white/5 p-4 text-sm text-white/55 transition duration-300 hover:border-[#F7B620]/40 hover:bg-white/[0.08]">
                        Chưa có dữ liệu. Bấm <strong>Tính kết quả</strong> để xem kết quả.
                    </div>
                </div>
            </div>

            <div id="toast" class="pointer-events-none fixed right-4 top-4 z-50 hidden max-w-sm rounded-2xl border border-[#F7B620]/20 bg-[#031E45]/95 px-4 py-3 text-sm text-[#F8F4E6] shadow-2xl shadow-black/30 backdrop-blur transition duration-300">
                <div class="font-semibold text-[#F7B620]">Thông báo</div>
                <div id="toastMessage" class="mt-1 text-white/75"></div>
            </div>
        </section>
    </main>

    <script>
        const form = document.getElementById("calcForm");
        const resultsGrid = document.getElementById("resultsGrid");
        const resultCount = document.getElementById("resultCount");
        const errorEl = document.getElementById("error");
        const shareBtn = document.getElementById("shareBtn");
        const toast = document.getElementById("toast");
        const toastMessage = document.getElementById("toastMessage");
        let latestPayload = null;
        let latestMeta = null;
        let toastTimer = null;

        function showToast(message) {
            toastMessage.textContent = message;
            toast.classList.remove("hidden");
            toast.classList.add("translate-y-0", "opacity-100");
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => {
                toast.classList.add("hidden");
            }, 2400);
        }

        function escapeHtml(value) {
            return String(value ?? "-")
                .replaceAll("&", "&amp;")
                .replaceAll("<", "&lt;")
                .replaceAll(">", "&gt;")
                .replaceAll('"', "&quot;")
                .replaceAll("'", "&#39;");
        }

        function renderValue(value) {
            const items = Array.isArray(value) ? value : [value];
            return items.map((item) => `
                <span class="inline-flex min-h-8 items-center rounded-full bg-[#F7B620]/15 px-3 py-1 text-sm font-semibold text-[#F7B620] transition duration-200 ease-out hover:-translate-y-0.5 hover:bg-[#F7B620]/[0.22] hover:shadow-sm hover:shadow-[#F7B620]/10">
                    ${escapeHtml(item)}
                </span>
            `).join("");
        }

        function renderCards(data) {
            const entries = Object.entries(data || {});
            resultCount.textContent = `${entries.length} chỉ số`;
            latestPayload = data || {};

            if (!entries.length) {
                resultsGrid.innerHTML = `
                    <div class="rounded-2xl border border-dashed border-white/15 bg-white/5 p-4 text-sm text-white/55">
                        Không có dữ liệu để hiển thị.
                    </div>
                `;
                return;
            }

            resultsGrid.innerHTML = entries.map(([key, value]) => `
                <article class="rounded-2xl border border-white/10 bg-white/5 p-4 shadow-sm shadow-black/10 transition duration-300 ease-out hover:-translate-y-0.5 hover:border-[#F7B620]/30 hover:bg-white/[0.08] hover:shadow-lg hover:shadow-black/20">
                    <div class="mb-2 text-xs font-semibold uppercase tracking-[0.18em] text-[#F7B620] transition duration-300">${escapeHtml(key)}</div>
                    <div class="flex flex-wrap gap-2">${renderValue(value)}</div>
                </article>
            `).join("");
        }

        function formatShareText() {
            const lines = [];
            if (latestMeta?.name) lines.push(`Họ tên: ${latestMeta.name}`);
            if (latestMeta?.birthday) lines.push(`Ngày sinh: ${latestMeta.birthday}`);
            lines.push("");
            lines.push("Kết quả:");

            for (const [key, value] of Object.entries(latestPayload || {})) {
                const items = Array.isArray(value) ? value : [value];
                lines.push(`- ${key}: ${items.join(", ")}`);
            }

            return lines.join("\n");
        }

        async function shareResults() {
            if (!latestPayload || !latestMeta) {
                showToast("Chưa có dữ liệu để share.");
                return;
            }

            const text = formatShareText();

            try {
                if (navigator.share) {
                    await navigator.share({
                        title: "Kết quả Thần Số Học",
                        text,
                    });
                    showToast("Đã mở bảng share.");
                } else if (navigator.clipboard?.writeText) {
                    await navigator.clipboard.writeText(text);
                    showToast("Đã copy nội dung để share.");
                } else {
                    throw new Error("Trình duyệt không hỗ trợ share hoặc clipboard.");
                }
            } catch (error) {
                showToast(error.message || "Không thể share.");
            }
        }

        shareBtn.addEventListener("click", shareResults);

        form.addEventListener("submit", async (event) => {
            event.preventDefault();
            errorEl.classList.add("hidden");
            errorEl.textContent = "";
            showToast("Đang gọi API...");

            const name = document.getElementById("fullName").value.trim();
            const birthday = document.getElementById("birthDate").value;
            latestMeta = { name, birthday };

            try {
                const response = await fetch(`/calculate?name=${encodeURIComponent(name)}&birthday=${encodeURIComponent(birthday)}`);
                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.message || `API lỗi: ${response.status}`);
                }

                renderCards(data);
                shareBtn.disabled = false;
                showToast("Đã cập nhật kết quả.");
            } catch (error) {
                errorEl.textContent = error.message || String(error);
                errorEl.classList.remove("hidden");
                showToast("Không thể lấy kết quả.");
            }
        });

        form.requestSubmit();
    </script>
</body>

</html>
